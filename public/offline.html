<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — WhoIsMyRep.us</title>
  <meta name="theme-color" content="#dc2626">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #09090b;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { text-align: center; max-width: 400px; }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      margin: 0 auto 1.5rem;
      display: block;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    p {
      color: #a1a1aa;
      font-size: 0.875rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .retry {
      display: inline-block;
      background: #dc2626;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry:hover { background: #b91c1c; }
    .hint {
      color: #52525b;
      font-size: 0.75rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo-192.png" alt="WhoIsMyRep.us" class="logo">
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection.
      Representative data, voting records, and campaign finance
      information require an active connection.
    </p>
    <button class="retry" onclick="window.location.reload()">Try Again</button>
    <p class="hint">Your saved reps and bills are stored locally and will be available when you reconnect.</p>
  </div>
</body>
</html>
